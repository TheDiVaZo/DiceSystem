version: 1.0

condition:
  group_1: "hand:diamond_sword || hand:wooden_sword && permission:moh.su"
  group_2: "group_1 || head:diamond_helmet"
  group_3: "foot:diamond_boots || sun_phase:6"

restrictions:
  rest_1:
    condition: "group_1 || group_3"
    count_point:
      operation: add #add or set
      count: "20" # any JS code or path for js's file
  rest_2:
    condition: "!(group_1 && group_3) || (!group_1 == group_2)"
    count_point:
      operation: add
      count: "-20"
  rest_3:
    condition: "hand:diamond_sword || sun_phase:6"
    count_point:
      operation: add
      count: "Math.cos(4)+Math.sin(8)"
  rest_4:
    condition: "true" #all true condition
    count_point:
      operation: add
      count: "test.js"


